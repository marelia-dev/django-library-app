{% extends 'base.html' %}
{% load static %}
{% block title %}Knygos egzemplioriaus trynimas{% endblock %}

{% block content %}
<h1>Knygos egzemplioriaus trynimas</h1>
<p>Ar tikrai norite ištrinti knygos egzempiorių "{{ instance }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary">Taip</button>
    <a class="btn btn-secondary" href="{% url 'instance' instance.pk %}">Ne</a>
</form>

{% endblock %}
