{% extends 'base.html' %}

{% block title %}Autorius{% endblock %}

{% block content %}
<h1>{{ author.first_name }} {{ author.last_name }}</h1>
<p>{{ author.description }}</p>
<hr>
<h2>Autoriaus knygos:</h2>
{% for book in author.books.all %}
<p><a href="{% url 'book' book.pk %}">{{ book.title }}</a></p>
{% endfor %}
{% endblock %}
