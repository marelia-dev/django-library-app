{% extends 'base.html' %}
{% load static %}
{% block title %}Administravimas{% endblock %}

{% block content %}

<div class="mb-2">
    <a href="{% url 'instance_create' %}" class="btn btn-primary">Naujas egzempliorius</a>
</div>

{% for instance in instances %}
<a href="{{ instance.pk }}">
    <p>
        {{ instance.book }} - {{ instance.uuid }}
        <span class="{% if instance.is_overdue %}text-danger{% endif %}">({{ instance.due_back }}, {{ instance.get_status_display }})</span>
    </p>
</a>
{% endfor %}
{% endblock %}
